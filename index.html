        // --- 状態管理 ---
        let savedChecks = JSON.parse(localStorage.getItem('meal_planner_summer_checks') || "{}");
        let selectedMeals = JSON.parse(localStorage.getItem('meal_planner_summer_selected') || "{}");

        function saveToLocal() {
            localStorage.setItem('meal_planner_summer_checks', JSON.stringify(savedChecks));
            localStorage.setItem('meal_planner_summer_selected', JSON.stringify(selectedMeals));
        }

        let currentWeek = 1;
        let prevWeekSource = 5;
        const EXCLUDE_LIST = ["牛乳", "卵", "もやし"];
        let RAW_DATA = [];

        function initData() {
            // RAW_DATA形式に変換
            RAW_DATA = Object.keys(MENU_DATA.meal_plan).map(key => {
                const weekNum = parseInt(key.replace('week_', ''));
                const days = MENU_DATA.meal_plan[key];
                const menu = [
                    { day: "月", ...days.monday },
                    { day: "火", ...days.tuesday },
                    { day: "水", ...days.wednesday },
                    { day: "木", ...days.thursday },
                    { day: "金", ...days.friday },
                    { day: "土", ...days.saturday },
                    { day: "日", ...days.sunday }
                ];
                return { week: weekNum, menu };
            });
            render();
        }

        window.toggleCheck = (id) => {
            savedChecks[id] = document.getElementById(id).checked;
            saveToLocal(); 
            render();
        };

        window.toggleMealSelection = (week, dayIndex, optionsStr, slot) => {
            const options = optionsStr.split('/');
            const key = `w${week}-d${dayIndex}-${slot}`;
            const current = selectedMeals[key] || options[0];
            const nextIndex = (options.indexOf(current) + 1) % options.length;
            selectedMeals[key] = options[nextIndex];
            saveToLocal();
            render();
        };

        window.changeWeek = (w) => { currentWeek = w; render(); };
        window.changePrevWeekSource = (w) => { prevWeekSource = w; render(); };

        window.resetCurrentWeek = () => {
            const modal = document.getElementById('confirm-modal');
            modal.classList.remove('hidden');
            window.pendingReset = "current";
        };

        window.resetAllData = () => {
            const modal = document.getElementById('confirm-modal');
            modal.classList.remove('hidden');
            window.pendingReset = "all";
        };

        window.closeModal = () => {
            document.getElementById('confirm-modal').classList.add('hidden');
        };

        window.confirmReset = () => {
            if (window.pendingReset === "current") {
                const prefix = `w${currentWeek}-`;
                Object.keys(savedChecks).forEach(k => { if (k.startsWith(prefix)) delete savedChecks[k]; });
                Object.keys(selectedMeals).forEach(k => { if (k.startsWith(prefix)) delete selectedMeals[k]; });
            } else {
                savedChecks = {};
                selectedMeals = {};
            }
            saveToLocal();
            render();
            window.closeModal();
        };

                const tab = document.getElementById(`tab-${i}`);
                if (tab) tab.classList.toggle('tab-active', i === currentWeek);
            }

            let targetPrevWeek = currentWeek === 1 ? prevWeekSource : currentWeek - 1;
            const prevWeekData = RAW_DATA.find(d => d.week === targetPrevWeek);

                                <span class="truncate">${mainDisp}</span>

                            </p>
                            <p class="text-xs text-slate-500 flex items-center mt-0.5 flex-wrap">
                                <span class="truncate">${sideDisp || '-'}</span>
                                ${isSideMultiple ? `<button onclick="toggleMealSelection(${currentWeek}, ${idx}, ${JSON.stringify(item.side)}, 's')" class="ml-2 text-[10px] bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded border border-slate-200 no-print">切替</button>` : ''}
                            </p>

                    </div>`;
                menuList.appendChild(div);
            });

            const superItems = new Map();

            weekData.menu.forEach((item, idx) => {
                const mainName = getSelectedItem(currentWeek, idx, 'main', item.main);
                const sideName = getSelectedItem(currentWeek, idx, 'side', item.side);
                [mainName, sideName].forEach(dishName => {
                    if (!dishName) return;
                    (INGREDIENTS[dishName] || []).forEach(ing => {
                        if (EXCLUDE_LIST.includes(ing.name)) return;
                        if ((idx < 5 && ing.cat === 'veg') || (ing.cat === 'veg' && ing.long)) aggregateIntoMap(seikyoItems, ing, dishName);
                        else if (idx < 5) aggregateIntoMap(superItems, ing, dishName);
                    });
                });
            });

            if (prevWeekData) {
                prevWeekData.menu.slice(5, 7).forEach((item, idx) => {
                    const actualIdx = idx + 5;
                    const mainName = getSelectedItem(targetPrevWeek, actualIdx, 'main', item.main);
                    const sideName = getSelectedItem(targetPrevWeek, actualIdx, 'side', item.side);
                    [mainName, sideName].forEach(dishName => {
                        if (!dishName) return;
                        (INGREDIENTS[dishName] || []).forEach(ing => {
                            if (!EXCLUDE_LIST.includes(ing.name) && !(ing.cat === 'veg' && ing.long)) aggregateIntoMap(superItems, ing, dishName);
                        });
                    });
                });
            }

            const weekOptionArea = document.getElementById('week-option-area');
            if (weekOptionArea && currentWeek === 1) {
                weekOptionArea.innerHTML = `<div class="bg-blue-100/50 p-2 rounded text-[10px] text-blue-800 flex items-center gap-2 mb-3"><span>前週参照:</span><button onclick="changePrevWeekSource(4)" class="px-2 py-0.5 rounded ${prevWeekSource === 4 ? 'bg-blue-600 text-white' : 'bg-white border border-blue-200'}">第4週</button><button onclick="changePrevWeekSource(5)" class="px-2 py-0.5 rounded ${prevWeekSource === 5 ? 'bg-blue-600 text-white' : 'bg-white border border-blue-200'}">第5週</button></div>`;
            } else if (weekOptionArea) weekOptionArea.innerHTML = '';

            renderList('seikyo-list', seikyoItems, 'seikyo');
            renderList('super-list', superItems, 'super');
        }

        function getSelectedItem(week, dayIdx, type, originalStr) {
            if (!originalStr) return "";
            const options = originalStr.split('/');
            if (options.length === 1) return options[0];
            const slot = type === "main" ? "m" : "s";
            const key = `w${week}-d${dayIdx}-${slot}`;
            const picked = selectedMeals[key];
            if (picked && options.includes(picked)) return picked;
            return options[0];
        }

        function aggregateIntoMap(map, ing, dishName) {
            if (!map.has(ing.name)) map.set(ing.name, { amount: 0, unit: ing.unit, dishes: new Set() });
            const entry = map.get(ing.name); 
            entry.amount += ing.amount; 
            entry.dishes.add(dishName);
        }

        function renderList(id, dataMap, type) {
            const el = document.getElementById(id);
            el.innerHTML = dataMap.size === 0 ? '<li class="text-slate-400 italic text-xs">特になし</li>' : '';
            Array.from(dataMap.keys()).sort().forEach(name => {
                const data = dataMap.get(name);
                const dishesText = Array.from(data.dishes).join('、');
                let displayAmount = typeof data.amount === 'number' ? Math.round(data.amount * 100) / 100 : data.amount;
                const amountText = (data.unit === '適量' || data.unit === 'P' || data.unit === '缶' || data.unit === '袋' || data.unit === '玉' || data.unit === '箱') ? data.unit : `${displayAmount}${data.unit}`;
                const checkId = `w${currentWeek}-${type}-${name}`;
                const isChecked = savedChecks[checkId] === true;
                const li = document.createElement('li');
                li.className = "flex items-start py-2 border-b border-black/5 last:border-0";
                li.innerHTML = `
                    <input type="checkbox" id="${checkId}" onchange="toggleCheck('${checkId}')" ${isChecked ? 'checked' : ''} class="mt-1 mr-3 w-5 h-5 rounded text-blue-500 flex-shrink-0 cursor-pointer">
                    <label for="${checkId}" class="leading-tight cursor-pointer font-medium flex-grow ${isChecked ? 'line-through text-slate-400 opacity-60' : 'text-slate-700'}">
                        ${name} <span class="text-blue-600 font-bold ml-1">${amountText}</span>
                        <span class="text-[10px] text-slate-400 block mt-1">(${dishesText})</span>
                    </label>
                `;
                el.appendChild(li);
            });
        }

        window.onload = initData;
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: #fffaf0; 
            -webkit-tap-highlight-color: transparent; 
            overscroll-behavior-y: contain;
        }
        .tab-active { border-bottom: 3px solid #f97316; color: #f97316; }
        @media print { .no-print { display: none !important; } }
        /* カスタムスクロールバーの非表示（モバイル向け） */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-4 sm:p-8 text-slate-900">
    <div id="app" class="max-w-4xl mx-auto">
        <header class="mb-6">
            <h1 class="text-2xl sm:text-3xl font-bold text-slate-800 tracking-tight">🌻 夏の献立カレンダー</h1>
            <p class="text-slate-500 text-xs sm:text-sm mt-1">野菜たっぷり・平日野菜は生協へ</p>
            
            <div class="flex gap-2 mt-4 no-print overflow-x-auto no-scrollbar">
                <button onclick="resetCurrentWeek()" class="whitespace-nowrap bg-orange-50 text-orange-600 px-3 py-1.5 rounded-lg text-xs font-medium border border-orange-200 active:bg-orange-100 transition">今週クリア</button>
                <button onclick="resetAllData()" class="whitespace-nowrap bg-red-50 text-red-600 px-3 py-1.5 rounded-lg text-xs font-medium border border-red-200 active:bg-red-100 transition">全リセット</button>
                <button onclick="window.print()" class="whitespace-nowrap bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg text-xs font-medium active:bg-slate-300">印刷</button>
            </div>
        </header>

        <!-- タブナビゲーション -->
        <div class="flex space-x-1 sm:space-x-4 mb-6 border-b border-slate-200 no-print overflow-x-auto no-scrollbar pb-px">
            <button onclick="changeWeek(1)" id="tab-1" class="px-3 py-2 font-bold transition whitespace-nowrap border-b-2 border-transparent text-sm sm:text-base">第1週</button>
            <button onclick="changeWeek(2)" id="tab-2" class="px-3 py-2 font-bold transition whitespace-nowrap border-b-2 border-transparent text-sm sm:text-base">第2週</button>
            <button onclick="changeWeek(3)" id="tab-3" class="px-3 py-2 font-bold transition whitespace-nowrap border-b-2 border-transparent text-sm sm:text-base">第3週</button>
            <button onclick="changeWeek(4)" id="tab-4" class="px-3 py-2 font-bold transition whitespace-nowrap border-b-2 border-transparent text-sm sm:text-base">第4週</button>
            <button onclick="changeWeek(5)" id="tab-5" class="px-3 py-2 font-bold transition whitespace-nowrap border-b-2 border-transparent text-sm sm:text-base">第5週</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- 献立セクション -->
            <div class="lg:col-span-5">
                <h2 class="text-lg font-bold text-slate-700 mb-4 flex items-center">
                    <span class="mr-2">📅</span> 今週の献立
                </h2>
                <div id="menu-list"></div>
            </div>

            <!-- お買い物リストセクション -->
            <div class="lg:col-span-7">
                <h2 class="text-lg font-bold text-slate-700 mb-4 flex items-center">
                    <span class="mr-2">🛒</span> お買い物リスト
                </h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-6">
                    <!-- 生協 -->
                    <div class="bg-orange-50 border border-orange-100 rounded-3xl p-5 shadow-sm">
                        <h3 class="text-orange-700 font-bold mb-4 text-sm sm:text-base border-b border-orange-200 pb-2 flex items-center justify-between">
                            生協 (月〜金野菜)
                            <span class="text-[10px] font-normal bg-orange-200 text-orange-800 px-2 py-0.5 rounded-full">配送</span>
                        </h3>
                        <ul id="seikyo-list" class="space-y-1 text-sm"></ul>
                    </div>
                    <!-- スーパー -->
                    <div class="bg-blue-50 border border-blue-100 rounded-3xl p-5 shadow-sm">
                        <h3 class="text-blue-700 font-bold mb-2 text-sm sm:text-base border-b border-blue-200 pb-2 flex items-center justify-between">
                            スーパー (その他)
                            <span class="text-[10px] font-normal bg-blue-200 text-blue-800 px-2 py-0.5 rounded-full">店舗</span>
                        </h3>
                        <div id="week-option-area" class="no-print"></div>
                        <ul id="super-list" class="space-y-1 text-sm"></ul>
                    </div>
                </div>
            </div>
        </div>

        <!-- コピーライト/フッター -->
        <footer class="mt-12 text-center text-slate-400 text-[10px] pb-8">
            Summer Meal Planner v2.0 - Local Storage Enabled
        </footer>
    </div>

    <!-- モーダル（確認用） -->
    <div id="confirm-modal" class="fixed inset-0 bg-slate-900/50 flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-2xl p-6 max-w-xs w-full shadow-2xl">
            <h3 class="text-lg font-bold mb-2">確認</h3>
            <p class="text-slate-600 text-sm mb-6">この操作は取り消せません。実行しますか？</p>
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-grow py-2 bg-slate-100 text-slate-600 rounded-xl font-bold">戻る</button>
                <button onclick="confirmReset()" class="flex-grow py-2 bg-red-500 text-white rounded-xl font-bold">実行</button>
            </div>
        </div>
    </div>
</body>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch((error) => {
                console.error('Service Worker registration failed:', error);
            });
        });
    }
</script>
